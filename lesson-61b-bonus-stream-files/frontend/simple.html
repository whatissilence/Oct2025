<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Upload Form</title>
</head>
<body>
<h1>Отправка формы</h1>

<form action="http://localhost:3000/upload"
      method="POST"
      enctype="multipart/form-data">

  <div>
    <label>
      Имя:
      <input type="text" name="name">
    </label>
  </div>

  <br>

  <div>
    <label>
      Email:
      <input type="email" name="email">
    </label>
  </div>

  <br>

  <div>
    <label>
      Аватар:
      <input type="file" name="avatar">
    </label>
  </div>

  <br>

  <button type="submit">
    Отправить
  </button>
</form>
</body>
</html>
